name: RAG Golden

on:
  push:
  workflow_dispatch:

jobs:
  golden:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX: ${{ secrets.PINECONE_INDEX }}
      PINECONE_NAMESPACE: ${{ secrets.PINECONE_NAMESPACE || 'top-4000' }}
      BM25_VALUES_PATH: rag/ingestion/bm25_values.json
      RAG_LLM_RERANK_ENABLED: "0"
      RAG_TITLE_JIKAN_FALLBACK: "0"
      RAG_TOP_K: "10"
      RAG_CANDIDATE_POOL_SIZE: "30"
      RAG_CHARACTER_CANDIDATE_POOL: "80"
      RAG_RESPONSE_CACHE_TTL_SECONDS: "0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: rag/requirements.txt

      - name: Validate secrets
        run: |
          test -n "$PINECONE_API_KEY"
          test -n "$PINECONE_INDEX"

      - name: Install RAG dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r rag/requirements.txt

      - name: Compile RAG code
        run: python -m py_compile rag/rag_api.py rag/eval/golden_top4000_pipeline.py

      - name: Start RAG service
        run: |
          nohup python -m uvicorn rag.rag_api:app --host 127.0.0.1 --port 8090 > /tmp/rag-api.out 2> /tmp/rag-api.err &
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8090/health | grep -q '"initialized":"true"'; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/rag-api.out || true
          cat /tmp/rag-api.err || true
          exit 1

      - name: Run golden suite
        run: |
          python rag/eval/golden_top4000_pipeline.py \
            --rag-endpoint http://127.0.0.1:8090/rag/search \
            --cases-json-path rag/eval/golden_top4000_cases.json \
            --top-k-success 10 \
            --min-hit-rate 0.90 \
            --timeout-seconds 12 \
            --output-path /tmp/golden_top4000_results.json

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-golden-diagnostics
          path: |
            /tmp/rag-api.out
            /tmp/rag-api.err
            /tmp/golden_top4000_results.json
