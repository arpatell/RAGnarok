<html lang="en">

    <meta

      content="RAGnarok Reader is an AI-powered manga and anime discovery app with hybrid semantic + keyword search, character-aware matching, and a universal chapter reader."

    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />

    <meta name="application-name" content="RAGnarok Reader" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" id="canonical-link" href="/" />

    <meta property="og:type" content="website" />

      property="og:description"

    <meta name="twitter:card" content="summary_large_image" />

      content="AI-powered manga and anime discovery with semantic + keyword retrieval and a universal chapter reader."

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "RAGnarok Reader",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Web Browser",
        "description": "AI-powered manga and anime discovery plus a universal manga chapter reader.",

    <script>
      (function () {
        var canonical = document.getElementById("canonical-link");
        if (canonical && window.location && window.location.origin) {
          canonical.href = window.location.origin + window.location.pathname;
        }
      })();
